<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Algebra Rush</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        /* ================= SCORE (BAR KECIL MEMANJANG) ================= */
        .score-container {
            position: fixed;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .score-box {
            min-width: 80px;
            padding: 5px 18px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;

            font-size: 15px;
            font-weight: bold;
            color: #8b5e3c;
            text-align: center;

            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        /* ================= CONTROL ================= */
        .control {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .btn-control {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            position: relative;

            background: radial-gradient(circle at 30% 30%, #e0b97a, #c89b5e);

            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.4),
                inset 0 -6px 8px rgba(0,0,0,0.25),
                0 4px 8px rgba(0,0,0,0.4);
        }

        .btn-control:active {
            transform: scale(0.9);
        }

        /* ================= ARROW ================= */
        .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .arrow-left::before {
            content: "";
            border: solid #8b5e3c;
            border-width: 0 7px 7px 0;
            display: inline-block;
            padding: 8px;
            transform: rotate(135deg);
        }

        .arrow-right::before {
            content: "";
            border: solid #8b5e3c;
            border-width: 0 7px 7px 0;
            display: inline-block;
            padding: 8px;
            transform: rotate(-45deg);
        }
    </style>
</head>

<body>

    <!-- SCORE -->
    <div class="score-container">
        <div class="score-box" id="score">0</div>
    </div>

    <!-- GAME -->
    <canvas id="canvas"></canvas>

    <!-- CONTROL -->
    <div class="control">
        <button class="btn-control" id="move-left">
            <div class="arrow arrow-left"></div>
        </button>

        <button class="btn-control" id="move-right">
            <div class="arrow arrow-right"></div>
        </button>
    </div>

    <!-- GAME SCRIPT -->
    <script src="js/Helper.js"></script>
    <script src="js/Person.js"></script>
    <script src="js/Tree.js"></script>
    <script src="js/Lumberjack.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
