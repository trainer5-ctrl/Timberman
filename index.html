<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Algebra Rush</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        /* ================= CONTROL ================= */
        .control {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .btn-control {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            position: relative;
            cursor: pointer;

            /* warna kayu */
            background: radial-gradient(circle at 30% 30%, #e0b97a, #c89b5e);

            /* efek depth */
            box-shadow: 
                inset 0 6px 10px rgba(255,255,255,0.4),
                inset 0 -8px 12px rgba(0,0,0,0.25),
                0 5px 10px rgba(0,0,0,0.4);
        }

        /* ring kayu */
        .btn-control::before {
            content: "";
            position: absolute;
            width: 65%;
            height: 65%;
            border-radius: 50%;
            top: 17.5%;
            left: 17.5%;
            border: 4px solid rgba(139, 94, 60, 0.4);
        }

        /* efek tekan */
        .btn-control:active {
            transform: scale(0.9);
        }

        /* ================= ARROW ================= */
        .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .arrow-left::before {
            content: "";
            border: solid #8b5e3c;
            border-width: 0 10px 10px 0;
            display: inline-block;
            padding: 12px;
            transform: rotate(135deg);
        }

        .arrow-right::before {
            content: "";
            border: solid #8b5e3c;
            border-width: 0 10px 10px 0;
            display: inline-block;
            padding: 12px;
            transform: rotate(-45deg);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="game">
            <canvas id="canvas"></canvas>
        </div>

        <!-- CONTROL BUTTON -->
        <div class="control">
            <button class="btn-control" id="move-left">
                <div class="arrow arrow-left"></div>
            </button>

            <button class="btn-control" id="move-right">
                <div class="arrow arrow-right"></div>
            </button>
        </div>
    </div>

    <!-- GAME SCRIPT -->
    <script src="js/Helper.js"></script>
    <script src="js/Person.js"></script>
    <script src="js/Tree.js"></script>
    <script src="js/Lumberjack.js"></script>
    <script src="js/main.js"></script>

    <!-- OPTIONAL: TEST CONTROL -->
    <script>
        const leftBtn = document.getElementById("move-left");
        const rightBtn = document.getElementById("move-right");

        leftBtn.addEventListener("touchstart", () => {
            console.log("LEFT pressed");
        });

        rightBtn.addEventListener("touchstart", () => {
            console.log("RIGHT pressed");
        });
    </script>
</body>
</html>
